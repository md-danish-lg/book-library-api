spring.application.name=book-library

# PostgreSQL Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5332/booklibrarydb
spring.datasource.username=danish
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# HikariCP Pool Sizing (Fixes undefined pool size logs)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10

# Explicit Hibernate Mappings (Fixes undefined driver/url logs)
spring.jpa.properties.hibernate.connection.url=${spring.datasource.url}
spring.jpa.properties.hibernate.connection.username=${spring.datasource.username}
spring.jpa.properties.hibernate.connection.password=${spring.datasource.password}

# JPA/Hibernate Behavior
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.connections.pooling=WARN